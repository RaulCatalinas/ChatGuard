name: chatguard
description: "Twitch moderation bot and management panel for streamers. Define your rules, manage your community and let ChatGuard enforce moderation automatically."
version: 0.0.1+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  window_close_guard: ^1.1.0
  logkeeper: ^1.3.0
  flutter_themed: ^1.1.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  image_path_ios: "assets/images/icon-ios.png"
  min_sdk_android: 21

  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
  linux:
    generate: true
  android: true
  ios: true
  web: 
    generate: false

flutter_native_splash:
  color: "#0E0E10"
  image: assets/icon.png

  android: true
  ios: true
  web: false

  android_12:
    image: assets/icon.png
    icon_background_color_dark: "#0E0E10"
